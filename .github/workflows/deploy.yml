name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_FORM_ENDPOINT: https://script.google.com/macros/s/AKfycbwe6bYJfqM4yN2_UuxnF764m1cv8h3i0RC17CGuFaLsDfB1TGwUBbd0YSlDhY9GsP8n/exec

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: calc.lazepil.ru
